# Netlify Configuration for FNT Motor Group

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Build environment variables
[build.environment]
  NODE_VERSION = "20"

# Redirects for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = {Role = []}

# Function settings (node bundler applies to all functions)
[functions]
  node_bundler = "esbuild"

# ============================================================================
# SCHEDULED SYNC DISABLED
# ============================================================================
# AutoTrader confirmed webhooks are working perfectly with 200 responses.
# The scheduled sync was causing 2-3 rapid API GET calls due to pagination
# (page 1, page 2, page 3 for ~200-250 vehicles at 100 per page).
# Per AutoTrader: max 3 API polls/day total — pagination counts as separate calls.
# 
# Solution: Rely 100% on real-time webhooks. No scheduled sync needed.
# Manual sync is still available via admin dashboard (trigger-sync function).
# ============================================================================
#
# [functions."sync-stock"]
#   schedule = "0 2 * * *"  # DISABLED - webhooks handle all updates

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Headers for Netlify Functions
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Autotrader-Signature"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# Environment-specific settings
[context.production]
  [context.production.environment]
    AUTOTRADER_ENVIRONMENT = "production"

[context.deploy-preview]
  [context.deploy-preview.environment]
    AUTOTRADER_ENVIRONMENT = "sandbox"

[context.branch-deploy]
  [context.branch-deploy.environment]
    AUTOTRADER_ENVIRONMENT = "sandbox"
